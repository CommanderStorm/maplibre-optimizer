name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  unit-test:
    name: Unit test the server
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - run: rustup update stable && rustup default stable
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { persist-credentials: false, submodules: true }
      - uses: arduino/setup-protoc@f4d5893b897028ff5739576ea0409746887fa536 # v3.0.0
        with: { repo-token: '${{ secrets.GITHUB_TOKEN }}' }
      - run: cargo test
      - run: cargo test --doc
  lint:
    name: Lint the Rust code
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - run: rustup update stable && rustup default stable
      - run: rustup component add clippy rustfmt
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { persist-credentials: false, submodules: true }
      - uses: taiki-e/install-action@c070f87102a1c75b3183910f391c1cb887fe13c8 # v2.77.6
        # TODO: add cargo-sort once https://github.com/taiki-e/install-action/pull/997 is resolved
        with: { tool: 'just,cargo-binstall' }
      - uses: arduino/setup-protoc@f4d5893b897028ff5739576ea0409746887fa536 # v3.0.0
        with: { repo-token: '${{ secrets.GITHUB_TOKEN }}' }
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
      - run: just env-info
      - run: just test-fmt
      - run: just clippy
  check:
    name: Check
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - run: rustup update stable && rustup default stable
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { persist-credentials: false, submodules: true }
      - uses: taiki-e/install-action@c070f87102a1c75b3183910f391c1cb887fe13c8 # v2.77.6
        with: { tool: 'just' }
      - uses: arduino/setup-protoc@f4d5893b897028ff5739576ea0409746887fa536 # v3.0.0
        with: { repo-token: '${{ secrets.GITHUB_TOKEN }}' }
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
      - run: just env-info
      - run: just check
      - run: just check-doc

  # This final step is needed to mark the whole workflow as successful
  # Don't change its name - it is used by the merge protection rules
  done:
    name: CI Finished
    runs-on: ubuntu-latest
    needs: [ check, lint, unit-test ]
    if: always()
    permissions: {}
    steps:
      - name: Result of the needed steps
        run: echo "${{ toJSON(needs) }}"
      - if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        name: CI Result
        run: exit 1
